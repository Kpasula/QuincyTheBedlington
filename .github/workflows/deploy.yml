name: Deploy

on:
  push:
    branches: [main, develop]

permissions:
  contents: read
  deployments: write

# Never let two deploys of the same branch run at once.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: build & deploy
    runs-on: ubuntu-latest
    # main -> production project, develop -> dedicated dev project
    environment: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
    env:
      # Each branch deploys to its OWN Pages project, and to that project's
      # production branch (main), so a real custom domain can be attached:
      #   main    -> quincythebedlington      -> quincythebedlington.com
      #   develop -> quincythebedlington-dev  -> dev.quincythebedlington.com
      PROJECT: ${{ github.ref_name == 'main' && 'quincythebedlington' || 'quincythebedlington-dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      # The npm bundled in the runner's Node toolcache has been unreliable
      # (a missing internal module crashes `npm ci`). Corepack provisions a
      # clean, pinned npm from the public registry.
      - name: Activate clean npm via Corepack
        run: |
          corepack enable
          corepack prepare npm@11.18.0 --activate
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Create the target Pages project if it doesn't exist yet. Running
      # wrangler directly (instead of the action) lets us swallow the
      # "already exists" case so it exits 0 and posts no scary annotation.
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if npx wrangler@3 pages project create "$PROJECT" --production-branch=main 2>err.log; then
            echo "Created Pages project $PROJECT."
          elif grep -qi "already exists\|8000007" err.log; then
            echo "Pages project $PROJECT already exists - nothing to do."
          else
            echo "Failed to ensure Pages project $PROJECT:" >&2
            cat err.log >&2
            exit 1
          fi

      # Deploy only runs if the build above succeeded. Always deploy to the
      # project's production branch (main) so the attached custom domain serves
      # it -- for develop that project is quincythebedlington-dev.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ env.PROJECT }}
            --branch=main
