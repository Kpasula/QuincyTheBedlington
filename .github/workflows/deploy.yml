name: Deploy

on:
  push:
    branches: [main, develop]

permissions:
  contents: read
  deployments: write

# Never let two deploys of the same branch run at once.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: build & deploy
    runs-on: ubuntu-latest
    # main -> production, develop -> preview
    environment: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      # The npm bundled in the runner's Node toolcache has been unreliable
      # (a missing internal module crashes `npm ci`). Corepack provisions a
      # clean, pinned npm from the public registry.
      - name: Activate clean npm via Corepack
        run: |
          corepack enable
          corepack prepare npm@11.18.0 --activate
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Deploy only runs if the build above succeeded.
      # branch=main is the project's production branch -> serves the custom
      # domains; any other branch (develop) publishes a preview at
      # <branch>.quincythebedlington.pages.dev
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=quincythebedlington
            --branch=${{ github.ref_name }}
