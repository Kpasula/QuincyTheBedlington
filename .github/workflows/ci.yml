name: CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      # The npm bundled in the runner's Node toolcache has been unreliable
      # (a missing internal module crashes `npm ci`). Corepack provisions a
      # clean, pinned npm from the public registry.
      - name: Activate clean npm via Corepack
        run: |
          corepack enable
          corepack prepare npm@11.18.0 --activate
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
