name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # The npm 10.9.7 bundled in the Node 22.22.2 runner toolcache is broken
      # (its @npmcli/arborist is missing the 'promise-retry' module), which makes
      # `npm ci` crash. Corepack fetches a clean npm 11 independent of it.
      - name: Activate clean npm via Corepack
        run: |
          corepack enable
          corepack prepare npm@11.18.0 --activate
          npm -v

      - name: Install dependencies
        run: npm ci --loglevel verbose

      - name: Dump npm debug log on failure
        if: failure()
        run: |
          echo "=== newest npm debug log ==="
          ls -t ~/.npm/_logs/*.log 2>/dev/null | head -1 | xargs -r tail -n 60

      - name: Build site
        run: npm run build
