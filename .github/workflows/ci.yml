name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Node 22.22.2 bundles npm 10.9.7, which crashes on Linux with
      # "Exit handler never called!" while installing sharp's platform-specific
      # optional deps. npm 11 fixes this.
      - name: Update npm
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
